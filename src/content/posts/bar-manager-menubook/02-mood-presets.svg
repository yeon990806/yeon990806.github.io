<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Inter, system-ui, sans-serif">
  <rect width="900" height="420" fill="#FAFAF9" />

  <text x="450" y="42" text-anchor="middle" fill="#262626" font-size="20" font-weight="800">무드 프리셋 5종</text>
  <text x="450" y="66" text-anchor="middle" fill="#737373" font-size="13">한 번 누르면 색 · 폰트 · 크기 · 단 수 · 카테고리 레이아웃이 한꺼번에 맞춰집니다</text>

  <!-- 스피크이지 -->
  <g transform="translate(40 100)">
    <rect width="152" height="210" rx="12" fill="#1F1108" stroke="#D4D4D4" stroke-width="1" />
    <text x="76" y="34" text-anchor="middle" fill="#C4A66B" font-size="13" font-weight="700" font-family="Georgia, serif">MIDNIGHT</text>
    <line x1="52" y1="44" x2="100" y2="44" stroke="#C4A66B" stroke-width="1" />
    <g font-family="Georgia, serif">
      <text x="16" y="72" fill="#E8D9C1" font-size="10">올드 패션드</text>
      <text x="136" y="72" text-anchor="end" fill="#C4A66B" font-size="10">14,000</text>
      <text x="16" y="92" fill="#E8D9C1" font-size="10">네그로니</text>
      <text x="136" y="92" text-anchor="end" fill="#C4A66B" font-size="10">15,000</text>
      <text x="16" y="112" fill="#E8D9C1" font-size="10">사제락</text>
      <text x="136" y="112" text-anchor="end" fill="#C4A66B" font-size="10">16,000</text>
    </g>
    <rect x="16" y="128" width="120" height="1" fill="#3D2A1A" />
    <g font-family="Georgia, serif">
      <text x="16" y="150" fill="#E8D9C1" font-size="10">맨해튼</text>
      <text x="136" y="150" text-anchor="end" fill="#C4A66B" font-size="10">15,000</text>
    </g>
    <text x="76" y="192" text-anchor="middle" fill="#8B7355" font-size="9">다크 앤티크 · 2단</text>
  </g>
  <text x="116" y="332" text-anchor="middle" fill="#262626" font-size="13" font-weight="800">스피크이지</text>
  <text x="116" y="352" text-anchor="middle" fill="#737373" font-size="11">classic · 2단</text>

  <!-- 페이퍼 -->
  <g transform="translate(212 100)">
    <rect width="152" height="210" rx="12" fill="#F4EFE4" stroke="#D4D4D4" stroke-width="1" />
    <text x="76" y="36" text-anchor="middle" fill="#2A2A2A" font-size="14" font-weight="700" font-family="Georgia, serif">Paper Bar</text>
    <g font-family="Georgia, serif">
      <text x="16" y="68" fill="#8B7355" font-size="8" letter-spacing="1">SIGNATURE</text>
      <text x="16" y="88" fill="#2A2A2A" font-size="10">진 토닉</text>
      <text x="136" y="88" text-anchor="end" fill="#8B7355" font-size="10">12,000</text>
      <text x="16" y="106" fill="#2A2A2A" font-size="10">마티니</text>
      <text x="136" y="106" text-anchor="end" fill="#8B7355" font-size="10">14,000</text>
      <text x="16" y="132" fill="#8B7355" font-size="8" letter-spacing="1">HIGHBALL</text>
      <text x="16" y="152" fill="#2A2A2A" font-size="10">하이볼</text>
      <text x="136" y="152" text-anchor="end" fill="#8B7355" font-size="10">10,000</text>
    </g>
    <text x="76" y="192" text-anchor="middle" fill="#A89880" font-size="9">크림 세리프 · 2단</text>
  </g>
  <text x="288" y="332" text-anchor="middle" fill="#262626" font-size="13" font-weight="800">페이퍼</text>
  <text x="288" y="352" text-anchor="middle" fill="#737373" font-size="11">serif · 2단</text>

  <!-- 뉴스프린트 -->
  <g transform="translate(384 100)">
    <rect width="152" height="210" rx="12" fill="#FDFCF7" stroke="#D4D4D4" stroke-width="1" />
    <text x="76" y="34" text-anchor="middle" fill="#1A1A1A" font-size="13" font-weight="800" font-family="Georgia, serif">THE DAILY</text>
    <line x1="16" y1="42" x2="136" y2="42" stroke="#1A1A1A" stroke-width="2" />
    <!-- 3단 -->
    <g font-family="Georgia, serif" font-size="7" fill="#1A1A1A">
      <text x="16" y="58">진토닉</text>
      <text x="16" y="70">마티니</text>
      <text x="16" y="82">네그로니</text>
      <text x="58" y="58">하이볼</text>
      <text x="58" y="70">모히토</text>
      <text x="58" y="82">다이키리</text>
      <text x="100" y="58">사워</text>
      <text x="100" y="70">스프리츠</text>
      <text x="100" y="82">콜린스</text>
    </g>
    <line x1="50" y1="50" x2="50" y2="90" stroke="#D4D4D4" stroke-width="1" />
    <line x1="92" y1="50" x2="92" y2="90" stroke="#D4D4D4" stroke-width="1" />
    <line x1="16" y1="102" x2="136" y2="102" stroke="#D4D4D4" stroke-width="1" />
    <g font-family="Georgia, serif" font-size="7" fill="#1A1A1A">
      <text x="16" y="118">올드패션드</text>
      <text x="58" y="118">사제락</text>
      <text x="100" y="118">맨해튼</text>
    </g>
    <text x="76" y="192" text-anchor="middle" fill="#8A8A8A" font-size="9">신문 3단 · 클래식</text>
  </g>
  <text x="460" y="332" text-anchor="middle" fill="#262626" font-size="13" font-weight="800">뉴스프린트</text>
  <text x="460" y="352" text-anchor="middle" fill="#737373" font-size="11">classic · 3단</text>

  <!-- 포스터 -->
  <g transform="translate(556 100)">
    <rect width="152" height="210" rx="12" fill="#FAFAFA" stroke="#D4D4D4" stroke-width="1" />
    <text x="16" y="42" fill="#171717" font-size="20" font-weight="900">BAR</text>
    <rect x="16" y="56" width="120" height="46" rx="4" fill="#E5E5E5" />
    <text x="16" y="124" fill="#171717" font-size="14" font-weight="900">올드 패션드</text>
    <text x="16" y="142" fill="#DC2626" font-size="12" font-weight="800">₩14,000</text>
    <text x="16" y="160" fill="#737373" font-size="8">버번에 각설탕과 비터스</text>
    <text x="76" y="192" text-anchor="middle" fill="#A3A3A3" font-size="9">큰 이름 매거진</text>
  </g>
  <text x="632" y="332" text-anchor="middle" fill="#262626" font-size="13" font-weight="800">포스터</text>
  <text x="632" y="352" text-anchor="middle" fill="#737373" font-size="11">display · 1단</text>

  <!-- 미니멀 -->
  <g transform="translate(728 100)">
    <rect width="152" height="210" rx="12" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1" />
    <text x="76" y="36" text-anchor="middle" fill="#262626" font-size="12" font-weight="600">minimal</text>
    <line x1="16" y1="48" x2="136" y2="48" stroke="#E5E5E5" stroke-width="1" />
    <g font-size="10" fill="#262626">
      <text x="16" y="72">진 토닉</text>
      <text x="136" y="72" text-anchor="end" fill="#525252">12,000</text>
      <text x="16" y="98">마티니</text>
      <text x="136" y="98" text-anchor="end" fill="#525252">14,000</text>
      <text x="16" y="124">네그로니</text>
      <text x="136" y="124" text-anchor="end" fill="#525252">15,000</text>
      <text x="16" y="150">하이볼</text>
      <text x="136" y="150" text-anchor="end" fill="#525252">10,000</text>
    </g>
    <text x="76" y="192" text-anchor="middle" fill="#A3A3A3" font-size="9">깨끗한 sans · 얇은 헤더</text>
  </g>
  <text x="804" y="332" text-anchor="middle" fill="#262626" font-size="13" font-weight="800">미니멀</text>
  <text x="804" y="352" text-anchor="middle" fill="#737373" font-size="11">sans · 1단</text>

  <!-- 하단 메모 -->
  <g transform="translate(40 378)">
    <rect width="840" height="30" rx="8" fill="#F5F5F4" />
    <text x="20" y="20" fill="#525252" font-size="12">
      썸네일은 그림이 아니라 <tspan font-weight="800" fill="#262626">실제 색·폰트로 렌더</tspan>합니다. 프리셋 값이 바뀌면 썸네일도 같이 바뀌어서, 어긋날 수가 없어요.
    </text>
  </g>
</svg>
