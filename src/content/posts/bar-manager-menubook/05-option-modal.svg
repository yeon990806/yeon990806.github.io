<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 920" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="920" fill="#E5E7EB" fill-opacity="0.6" />

  <!-- 모달 -->
  <g transform="translate(100 80)">
    <rect width="600" height="760" rx="20" fill="#fff" />

    <!-- 헤더 -->
    <g>
      <text x="32" y="46" fill="#262626" font-size="22" font-weight="800">진토닉</text>
      <text x="32" y="68" fill="#737373" font-size="13">기주를 바꾸거나 잔 수를 조절하세요</text>
      <g transform="translate(540 24)">
        <rect width="40" height="40" rx="10" fill="none" />
        <text x="20" y="28" text-anchor="middle" fill="#A3A3A3" font-size="22">×</text>
      </g>
      <line x1="0" y1="92" x2="600" y2="92" stroke="#E5E5E5" />
    </g>

    <!-- 사진 -->
    <g transform="translate(32 116)">
      <rect width="536" height="180" rx="14" fill="#F5F5F5" />
      <text x="268" y="106" text-anchor="middle" fill="#A3A3A3" font-size="60">🍸</text>
    </g>

    <!-- 기주 옵션 영역 -->
    <g transform="translate(32 316)">
      <rect width="536" height="296" rx="14" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2" />
      <text x="20" y="32" fill="#B45309" font-size="11" font-weight="800" letter-spacing="2">🔁  기주 선택</text>

      <!-- 옵션 1 - 고든스 (선택 안 됨) -->
      <g transform="translate(20 48)">
        <rect width="496" height="58" rx="12" fill="#fff" stroke="#E5E5E5" stroke-width="2" />
        <circle cx="28" cy="29" r="11" fill="none" stroke="#D4D4D4" stroke-width="2" />
        <text x="50" y="35" fill="#404040" font-size="14" font-weight="800">고든스 진</text>
        <g transform="translate(140 19)">
          <rect width="40" height="20" rx="10" fill="#F5F5F5" />
          <text x="20" y="14" text-anchor="middle" fill="#525252" font-size="10" font-weight="800">기본</text>
        </g>
        <text x="476" y="35" text-anchor="end" fill="#A3A3A3" font-size="13" font-weight="800">+₩0</text>
      </g>

      <!-- 옵션 2 - 비피터 (선택됨) -->
      <g transform="translate(20 122)">
        <!-- 외곽 글로우 -->
        <rect x="-4" y="-4" width="504" height="66" rx="14" fill="#2563EB" fill-opacity="0.12" />
        <!-- 본체 -->
        <rect width="496" height="58" rx="12" fill="#DBEAFE" stroke="#2563EB" stroke-width="2" />
        <circle cx="28" cy="29" r="11" fill="#2563EB" stroke="#2563EB" stroke-width="2" />
        <path d="M22 29 l5 5 l9 -10" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" />
        <text x="50" y="35" fill="#1D4ED8" font-size="14" font-weight="800">비피터 런던 드라이</text>
        <text x="476" y="35" text-anchor="end" fill="#B45309" font-size="13" font-weight="800">+₩1,000</text>
      </g>

      <!-- 옵션 3 - 봄베이 -->
      <g transform="translate(20 200)">
        <rect width="496" height="58" rx="12" fill="#fff" stroke="#E5E5E5" stroke-width="2" />
        <circle cx="28" cy="29" r="11" fill="none" stroke="#D4D4D4" stroke-width="2" />
        <text x="50" y="35" fill="#404040" font-size="14" font-weight="800">봄베이 사파이어</text>
        <text x="476" y="35" text-anchor="end" fill="#B45309" font-size="13" font-weight="800">+₩2,000</text>
      </g>
    </g>

    <!-- 수량 -->
    <g transform="translate(32 632)">
      <text fill="#A3A3A3" font-size="11" font-weight="800" letter-spacing="2">수량</text>
      <g transform="translate(0 16)">
        <rect width="536" height="60" rx="14" fill="#fff" stroke="#E5E5E5" />
        <rect x="14" y="14" width="44" height="32" rx="8" fill="#F5F5F5" stroke="#E5E5E5" />
        <text x="36" y="36" text-anchor="middle" fill="#525252" font-size="20" font-weight="800">−</text>
        <text x="268" y="40" text-anchor="middle" fill="#262626" font-size="22" font-weight="800">2</text>
        <rect x="478" y="14" width="44" height="32" rx="8" fill="#F5F5F5" stroke="#E5E5E5" />
        <text x="500" y="36" text-anchor="middle" fill="#525252" font-size="20" font-weight="800">+</text>
      </g>
    </g>

    <!-- 푸터 -->
    <line x1="0" y1="720" x2="600" y2="720" stroke="#E5E5E5" />
    <g transform="translate(0 720)">
      <!-- 취소 -->
      <g transform="translate(290 12)">
        <rect width="80" height="40" rx="10" fill="none" stroke="#E5E5E5" />
        <text x="40" y="26" text-anchor="middle" fill="#737373" font-size="13" font-weight="700">취소</text>
      </g>
      <!-- 담기 -->
      <g transform="translate(380 12)">
        <rect width="190" height="40" rx="10" fill="#2563EB" />
        <text x="95" y="27" text-anchor="middle" fill="#fff" font-size="13" font-weight="800">담기 · ₩18,000</text>
      </g>
    </g>
  </g>
</svg>
