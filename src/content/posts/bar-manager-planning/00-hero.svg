<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.6" />
    </linearGradient>
    <linearGradient id="liquid1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>
    <linearGradient id="liquid2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a" />
      <stop offset="100%" stop-color="#92400e" />
    </linearGradient>
    <linearGradient id="liquid3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fca5a5" />
      <stop offset="100%" stop-color="#7f1d1d" />
    </linearGradient>
  </defs>

  <rect width="1600" height="800" fill="url(#bg)" />

  <!-- 빛 -->
  <ellipse cx="800" cy="700" rx="700" ry="120" fill="url(#glow)" opacity="0.15" />

  <!-- 선반 -->
  <rect x="0" y="690" width="1600" height="4" fill="#475569" opacity="0.6" />
  <rect x="0" y="450" width="1600" height="3" fill="#334155" opacity="0.6" />

  <!-- 위쪽 선반 위 병들 -->
  <g opacity="0.85">
    <!-- 병 1 -->
    <g transform="translate(180 280)">
      <rect x="-22" y="0" width="44" height="32" rx="4" fill="#0f172a" />
      <rect x="-10" y="-22" width="20" height="22" fill="#1e293b" />
      <rect x="-32" y="32" width="64" height="138" rx="6" fill="#1e293b" />
      <rect x="-26" y="55" width="52" height="65" rx="3" fill="url(#liquid1)" opacity="0.85" />
      <rect x="-26" y="120" width="52" height="2" fill="#fbbf24" opacity="0.5" />
    </g>
    <!-- 병 2 -->
    <g transform="translate(320 270)">
      <rect x="-22" y="0" width="44" height="28" rx="4" fill="#0f172a" />
      <rect x="-9" y="-26" width="18" height="26" fill="#0f172a" />
      <rect x="-30" y="28" width="60" height="152" rx="6" fill="#1e293b" />
      <rect x="-24" y="55" width="48" height="100" rx="3" fill="url(#liquid2)" opacity="0.85" />
      <text x="0" y="100" text-anchor="middle" fill="#fbbf24" font-family="Georgia, serif" font-size="9" font-style="italic" opacity="0.6">aged</text>
    </g>
    <!-- 병 3 -->
    <g transform="translate(460 285)">
      <rect x="-20" y="0" width="40" height="26" rx="3" fill="#0f172a" />
      <rect x="-10" y="-20" width="20" height="20" fill="#1e293b" />
      <rect x="-28" y="26" width="56" height="139" rx="6" fill="#1e293b" />
      <rect x="-22" y="50" width="44" height="80" rx="3" fill="url(#liquid3)" opacity="0.85" />
    </g>
    <!-- 병 4 -->
    <g transform="translate(580 290)">
      <rect x="-18" y="0" width="36" height="24" rx="3" fill="#0f172a" />
      <rect x="-9" y="-18" width="18" height="18" fill="#0f172a" />
      <rect x="-26" y="24" width="52" height="136" rx="6" fill="#1e293b" />
      <rect x="-21" y="48" width="42" height="58" rx="3" fill="url(#liquid1)" opacity="0.6" />
    </g>
    <!-- 병 5 -->
    <g transform="translate(700 280)">
      <rect x="-22" y="0" width="44" height="28" rx="4" fill="#0f172a" />
      <rect x="-10" y="-24" width="20" height="24" fill="#1e293b" />
      <rect x="-30" y="28" width="60" height="142" rx="6" fill="#1e293b" />
      <rect x="-24" y="55" width="48" height="80" rx="3" fill="url(#liquid2)" opacity="0.85" />
    </g>
    <!-- 안 보이는 병들 (흐릿) -->
    <g opacity="0.3">
      <rect x="120" y="500" width="60" height="180" rx="6" fill="#1e293b" />
      <rect x="220" y="495" width="55" height="185" rx="6" fill="#1e293b" />
      <rect x="320" y="510" width="58" height="175" rx="6" fill="#1e293b" />
      <rect x="420" y="500" width="60" height="185" rx="6" fill="#1e293b" />
      <rect x="520" y="505" width="55" height="180" rx="6" fill="#1e293b" />
      <rect x="620" y="500" width="60" height="185" rx="6" fill="#1e293b" />
      <rect x="720" y="510" width="58" height="175" rx="6" fill="#1e293b" />
    </g>
  </g>

  <!-- 핵심 텍스트 -->
  <g transform="translate(900 380)">
    <text fill="#fbbf24" font-family="Georgia, serif" font-size="22" font-style="italic" letter-spacing="6">CHAPTER 01</text>
    <text y="80" fill="#f8fafc" font-family="Georgia, serif" font-size="68" font-weight="700" letter-spacing="-1">술병은 늘어나는데</text>
    <text y="160" fill="#f8fafc" font-family="Georgia, serif" font-size="68" font-weight="700" letter-spacing="-1">뭐가 남았는지 모른다</text>
    <line x1="0" y1="200" x2="120" y2="200" stroke="#fbbf24" stroke-width="3" />
    <text y="245" fill="#cbd5e1" font-family="Inter, sans-serif" font-size="22" letter-spacing="0">바 매니저 — 재고·주문 관리 서비스 기획기</text>
  </g>
</svg>
