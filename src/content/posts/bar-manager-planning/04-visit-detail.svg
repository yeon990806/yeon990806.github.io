<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 880" font-family="Inter, system-ui, sans-serif">
  <rect width="1200" height="880" fill="#E5E7EB" fill-opacity="0.6" />

  <!-- 모달 -->
  <g transform="translate(110 40)">
    <rect width="980" height="800" rx="20" fill="#fff" />

    <!-- 헤더 -->
    <g>
      <text x="32" y="44" fill="#262626" font-size="22" font-weight="800">T1 홀 좌석 · 3명</text>
      <text x="32" y="68" fill="#737373" font-size="13">26-06-27 19:32 · 시작 32분 전</text>
      <g transform="translate(920 28)">
        <rect width="40" height="40" rx="10" fill="none" />
        <text x="20" y="28" text-anchor="middle" fill="#A3A3A3" font-size="22">×</text>
      </g>
      <line x1="0" y1="92" x2="980" y2="92" stroke="#E5E5E5" />
    </g>

    <!-- 고객 정보 박스 -->
    <g transform="translate(32 116)">
      <rect width="916" height="70" rx="10" fill="#FAFAF9" stroke="#E5E5E5" />
      <text x="20" y="26" fill="#A3A3A3" font-size="10" font-weight="800" letter-spacing="1">고객</text>
      <text x="20" y="50" fill="#262626" font-size="14" font-weight="800">김OO <tspan fill="#737373" font-weight="500">·  010-1234-5678</tspan></text>
    </g>

    <!-- 주문 라벨 -->
    <text x="32" y="216" fill="#A3A3A3" font-size="10" font-weight="800" letter-spacing="1">주문 (3건)</text>

    <!-- Order 1 — QR 주문, 완료 -->
    <g transform="translate(32 234)">
      <rect width="916" height="148" rx="12" fill="#fff" stroke="#E5E5E5" />

      <!-- 헤더 라인 -->
      <text x="20" y="32" fill="#737373" font-size="12" font-weight="800">19:38</text>
      <g transform="translate(78 18)">
        <rect width="38" height="20" rx="10" fill="#DBEAFE" />
        <text x="19" y="14" text-anchor="middle" fill="#1D4ED8" font-size="9" font-weight="800">QR</text>
      </g>

      <!-- 완료 칩 (우측) -->
      <g transform="translate(836 16)">
        <rect width="60" height="22" rx="6" fill="#ECFDF5" />
        <text x="30" y="16" text-anchor="middle" fill="#047857" font-size="11" font-weight="800">완료</text>
      </g>

      <!-- 항목 1: 올드 패션드 -->
      <text x="20" y="74" fill="#262626" font-size="14" font-weight="700">올드 패션드 <tspan fill="#A3A3A3" font-weight="500">× 1</tspan></text>
      <text x="896" y="74" text-anchor="end" fill="#262626" font-size="14" font-weight="800">₩12,000</text>

      <!-- 항목 2: 진토닉 -->
      <text x="20" y="106" fill="#262626" font-size="14" font-weight="700">진토닉 <tspan fill="#A3A3A3" font-weight="500">× 2</tspan></text>
      <text x="896" y="106" text-anchor="end" fill="#262626" font-size="14" font-weight="800">₩18,000</text>

      <!-- 기주 정보 -->
      <text x="40" y="128" fill="#B45309" font-size="11" font-weight="700">🔁 기주: 비피터 (+₩1,000)</text>
    </g>

    <!-- Order 2 — STAFF 주문, 취소 -->
    <g transform="translate(32 402)">
      <rect width="916" height="96" rx="12" fill="#fff" stroke="#E5E5E5" />

      <text x="20" y="32" fill="#737373" font-size="12" font-weight="800">19:54</text>
      <g transform="translate(78 18)">
        <rect width="60" height="20" rx="10" fill="#FAFAF9" />
        <text x="30" y="14" text-anchor="middle" fill="#737373" font-size="9" font-weight="800">STAFF</text>
      </g>

      <!-- 우측 액션 -->
      <text x="896" y="32" text-anchor="end" fill="#DC2626" font-size="12" font-weight="800">주문 취소</text>

      <text x="20" y="74" fill="#A3A3A3" font-size="14" font-weight="700" text-decoration="line-through">맨해튼 <tspan fill="#A3A3A3" font-weight="500">× 1</tspan></text>
      <text x="896" y="74" text-anchor="end" fill="#A3A3A3" font-size="14" font-weight="800" text-decoration="line-through">₩14,000</text>
    </g>

    <!-- 합계 -->
    <g transform="translate(32 520)">
      <rect width="916" height="64" rx="10" fill="#EFF6FF" />
      <text x="24" y="40" fill="#525252" font-size="14" font-weight="700">합계</text>
      <text x="892" y="42" text-anchor="end" fill="#1D4ED8" font-size="24" font-weight="800">₩44,000</text>
    </g>

    <!-- 메뉴 추가 -->
    <g transform="translate(32 608)">
      <rect width="916" height="102" rx="12" fill="#FAFAF9" stroke="#E5E5E5" stroke-dasharray="4 4" />
      <text x="24" y="30" fill="#262626" font-size="13" font-weight="800">메뉴 추가</text>

      <!-- 검색 input + 담기 -->
      <g transform="translate(24 50)">
        <rect width="868" height="36" rx="8" fill="#fff" stroke="#E5E5E5" />
        <text x="16" y="23" fill="#A3A3A3" font-size="12">메뉴 검색...</text>
        <g transform="translate(800 4)">
          <rect width="60" height="28" rx="6" fill="#2563EB" />
          <text x="30" y="19" text-anchor="middle" fill="#fff" font-size="11" font-weight="800">담기</text>
        </g>
      </g>
    </g>

    <!-- 푸터 -->
    <line x1="0" y1="734" x2="980" y2="734" stroke="#E5E5E5" />
    <g transform="translate(0 734)">
      <!-- 닫기 -->
      <g transform="translate(600 20)">
        <rect width="92" height="46" rx="12" fill="none" stroke="#E5E5E5" />
        <text x="46" y="29" text-anchor="middle" fill="#737373" font-size="13" font-weight="700">닫기</text>
      </g>
      <!-- 결제 -->
      <g transform="translate(708 20)">
        <rect width="240" height="46" rx="12" fill="#2563EB" />
        <text x="120" y="30" text-anchor="middle" fill="#fff" font-size="14" font-weight="800">결제 · ₩44,000</text>
      </g>
    </g>
  </g>
</svg>
