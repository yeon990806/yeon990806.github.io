<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="Inter, system-ui, sans-serif">
  <rect width="1200" height="780" fill="#FAFAF9" />

  <!-- 헤더 -->
  <text x="60" y="60" fill="#262626" font-size="24" font-weight="800">매출</text>

  <!-- 범위 토글 -->
  <g transform="translate(900 36)">
    <rect width="240" height="42" rx="10" fill="#F5F5F5" stroke="#E5E5E5" />
    <rect x="4" y="4" width="60" height="34" rx="8" fill="#fff" />
    <text x="34" y="26" text-anchor="middle" fill="#262626" font-size="12" font-weight="800">오늘</text>
    <text x="98" y="26" text-anchor="middle" fill="#737373" font-size="12" font-weight="700">이번 주</text>
    <text x="158" y="26" text-anchor="middle" fill="#737373" font-size="12" font-weight="700">이번 달</text>
    <text x="216" y="26" text-anchor="middle" fill="#737373" font-size="12" font-weight="700">전체</text>
  </g>

  <!-- KPI 카드 4개 — width 260, gap 20 -->
  <g transform="translate(60 100)">
    <rect width="260" height="100" rx="14" fill="#fff" stroke="#E5E5E5" />
    <text x="20" y="32" fill="#737373" font-size="10" font-weight="800" letter-spacing="1">총 매출</text>
    <text x="20" y="72" fill="#1D4ED8" font-size="26" font-weight="800">₩412,000</text>
  </g>
  <g transform="translate(340 100)">
    <rect width="260" height="100" rx="14" fill="#fff" stroke="#E5E5E5" />
    <text x="20" y="32" fill="#737373" font-size="10" font-weight="800" letter-spacing="1">VISIT</text>
    <text x="20" y="72" fill="#262626" font-size="26" font-weight="800">14건</text>
  </g>
  <g transform="translate(620 100)">
    <rect width="260" height="100" rx="14" fill="#fff" stroke="#E5E5E5" />
    <text x="20" y="32" fill="#737373" font-size="10" font-weight="800" letter-spacing="1">VISIT당 평균</text>
    <text x="20" y="72" fill="#262626" font-size="26" font-weight="800">₩29,428</text>
  </g>
  <g transform="translate(900 100)">
    <rect width="240" height="100" rx="14" fill="#fff" stroke="#E5E5E5" />
    <text x="20" y="32" fill="#737373" font-size="10" font-weight="800" letter-spacing="1">평균 별점</text>
    <text x="20" y="72" fill="#B45309" font-size="26" font-weight="800">4.6 ★</text>
  </g>

  <!-- 시간대별 막대 -->
  <g transform="translate(60 230)">
    <rect width="540" height="280" rx="14" fill="#fff" stroke="#E5E5E5" />
    <text x="22" y="36" fill="#262626" font-size="14" font-weight="800">시간대별 매출</text>

    <!-- 그래프 영역 — 0시~23시, 24개 막대, 너비 16, 간격 6 (총 528) -->
    <g transform="translate(22 240)">
      <line x1="0" y1="0" x2="500" y2="0" stroke="#E5E5E5" />
      <!-- 막대들 -->
      <g fill="#3B82F6">
        <rect x="0" y="-30" width="16" height="30" rx="2" />
        <rect x="22" y="-12" width="16" height="12" rx="2" />
        <rect x="44" y="-5" width="16" height="5" rx="2" />
        <rect x="66" y="-2" width="16" height="2" rx="2" />
        <rect x="264" y="-3" width="16" height="3" rx="2" />
        <rect x="286" y="-6" width="16" height="6" rx="2" />
        <rect x="308" y="-10" width="16" height="10" rx="2" />
        <rect x="330" y="-15" width="16" height="15" rx="2" />
        <rect x="352" y="-22" width="16" height="22" rx="2" />
        <rect x="374" y="-45" width="16" height="45" rx="2" />
        <rect x="396" y="-90" width="16" height="90" rx="2" />
        <rect x="418" y="-140" width="16" height="140" rx="2" />
        <rect x="440" y="-180" width="16" height="180" rx="2" />
        <rect x="462" y="-160" width="16" height="160" rx="2" />
        <rect x="484" y="-120" width="16" height="120" rx="2" />
      </g>
      <text x="8" y="16" fill="#A3A3A3" font-size="9">0</text>
      <text x="270" y="16" fill="#A3A3A3" font-size="9">12</text>
      <text x="492" y="16" fill="#A3A3A3" font-size="9">22</text>
    </g>
  </g>

  <!-- 인기 메뉴 -->
  <g transform="translate(620 230)">
    <rect width="520" height="280" rx="14" fill="#fff" stroke="#E5E5E5" />
    <text x="22" y="36" fill="#262626" font-size="14" font-weight="800">인기 메뉴</text>
    <text x="498" y="36" text-anchor="end" fill="#737373" font-size="11">총 12종</text>

    <g transform="translate(22 64)">
      <!-- 1위 -->
      <g>
        <circle cx="10" cy="10" r="10" fill="#F5F5F5" />
        <text x="10" y="14" text-anchor="middle" fill="#525252" font-size="9" font-weight="800">1</text>
        <text x="28" y="14" fill="#262626" font-size="13" font-weight="700">올드 패션드</text>
        <text x="160" y="14" fill="#A3A3A3" font-size="11">× 22</text>
        <text x="476" y="14" text-anchor="end" fill="#262626" font-size="13" font-weight="800">₩88,000</text>
        <rect x="0" y="22" width="476" height="5" rx="2.5" fill="#F5F5F5" />
        <rect x="0" y="22" width="476" height="5" rx="2.5" fill="#10B981" />
      </g>
      <!-- 2위 -->
      <g transform="translate(0 42)">
        <circle cx="10" cy="10" r="10" fill="#F5F5F5" />
        <text x="10" y="14" text-anchor="middle" fill="#525252" font-size="9" font-weight="800">2</text>
        <text x="28" y="14" fill="#262626" font-size="13" font-weight="700">진토닉</text>
        <text x="160" y="14" fill="#A3A3A3" font-size="11">× 18</text>
        <text x="476" y="14" text-anchor="end" fill="#262626" font-size="13" font-weight="800">₩72,000</text>
        <rect x="0" y="22" width="476" height="5" rx="2.5" fill="#F5F5F5" />
        <rect x="0" y="22" width="389" height="5" rx="2.5" fill="#10B981" />
      </g>
      <!-- 3위 -->
      <g transform="translate(0 84)">
        <circle cx="10" cy="10" r="10" fill="#F5F5F5" />
        <text x="10" y="14" text-anchor="middle" fill="#525252" font-size="9" font-weight="800">3</text>
        <text x="28" y="14" fill="#262626" font-size="13" font-weight="700">맨해튼</text>
        <text x="160" y="14" fill="#A3A3A3" font-size="11">× 14</text>
        <text x="476" y="14" text-anchor="end" fill="#262626" font-size="13" font-weight="800">₩70,000</text>
        <rect x="0" y="22" width="476" height="5" rx="2.5" fill="#F5F5F5" />
        <rect x="0" y="22" width="303" height="5" rx="2.5" fill="#10B981" />
      </g>
      <!-- 4위 -->
      <g transform="translate(0 126)">
        <circle cx="10" cy="10" r="10" fill="#F5F5F5" />
        <text x="10" y="14" text-anchor="middle" fill="#525252" font-size="9" font-weight="800">4</text>
        <text x="28" y="14" fill="#262626" font-size="13" font-weight="700">네그로니</text>
        <text x="160" y="14" fill="#A3A3A3" font-size="11">× 9</text>
        <text x="476" y="14" text-anchor="end" fill="#262626" font-size="13" font-weight="800">₩45,000</text>
        <rect x="0" y="22" width="476" height="5" rx="2.5" fill="#F5F5F5" />
        <rect x="0" y="22" width="195" height="5" rx="2.5" fill="#10B981" />
      </g>
      <!-- 5위 -->
      <g transform="translate(0 168)">
        <circle cx="10" cy="10" r="10" fill="#F5F5F5" />
        <text x="10" y="14" text-anchor="middle" fill="#525252" font-size="9" font-weight="800">5</text>
        <text x="28" y="14" fill="#262626" font-size="13" font-weight="700">에스프레소 마티니</text>
        <text x="200" y="14" fill="#A3A3A3" font-size="11">× 7</text>
        <text x="476" y="14" text-anchor="end" fill="#262626" font-size="13" font-weight="800">₩35,000</text>
        <rect x="0" y="22" width="476" height="5" rx="2.5" fill="#F5F5F5" />
        <rect x="0" y="22" width="152" height="5" rx="2.5" fill="#10B981" />
      </g>
    </g>
  </g>

  <!-- 결제 방법별 -->
  <g transform="translate(60 540)">
    <rect width="1080" height="200" rx="14" fill="#fff" stroke="#E5E5E5" />
    <text x="22" y="36" fill="#262626" font-size="14" font-weight="800">결제 방법별</text>

    <!-- 행 1: 현금 -->
    <g transform="translate(22 70)">
      <text x="0" y="0" fill="#525252" font-size="12" font-weight="700">현금</text>
      <text x="56" y="0" fill="#A3A3A3" font-size="11" font-weight="500">· 6건</text>
      <text x="1036" y="0" text-anchor="end" fill="#262626" font-size="13" font-weight="800">₩186,000</text>
      <rect x="0" y="12" width="1036" height="8" rx="4" fill="#F5F5F5" />
      <rect x="0" y="12" width="467" height="8" rx="4" fill="#3B82F6" />
    </g>

    <!-- 행 2: 카드 -->
    <g transform="translate(22 108)">
      <text x="0" y="0" fill="#525252" font-size="12" font-weight="700">카드</text>
      <text x="56" y="0" fill="#A3A3A3" font-size="11" font-weight="500">· 7건</text>
      <text x="1036" y="0" text-anchor="end" fill="#262626" font-size="13" font-weight="800">₩201,000</text>
      <rect x="0" y="12" width="1036" height="8" rx="4" fill="#F5F5F5" />
      <rect x="0" y="12" width="505" height="8" rx="4" fill="#3B82F6" />
    </g>

    <!-- 행 3: 계좌이체 -->
    <g transform="translate(22 146)">
      <text x="0" y="0" fill="#525252" font-size="12" font-weight="700">계좌이체</text>
      <text x="80" y="0" fill="#A3A3A3" font-size="11" font-weight="500">· 1건</text>
      <text x="1036" y="0" text-anchor="end" fill="#262626" font-size="13" font-weight="800">₩25,000</text>
      <rect x="0" y="12" width="1036" height="8" rx="4" fill="#F5F5F5" />
      <rect x="0" y="12" width="63" height="8" rx="4" fill="#3B82F6" />
    </g>
  </g>
</svg>
