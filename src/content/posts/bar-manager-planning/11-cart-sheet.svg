<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="Inter, system-ui, sans-serif">
  <rect width="1200" height="760" fill="#FAFAF9" />

  <!-- 제목 -->
  <text x="600" y="50" text-anchor="middle" fill="#262626" font-size="20" font-weight="800">카트 시트 — 접힘 / 펼침</text>

  <!-- 접힌 상태 -->
  <g transform="translate(120 120)">
    <text fill="#737373" font-size="11" font-weight="800" letter-spacing="2">접힌 상태</text>

    <g transform="translate(0 26)">
      <rect width="420" height="560" rx="32" fill="#fff" stroke="#262626" stroke-width="3" />
      <rect x="160" y="14" width="100" height="20" rx="10" fill="#262626" />

      <text x="210" y="80" text-anchor="middle" fill="#A3A3A3" font-size="10" font-weight="800" letter-spacing="3">MENU</text>

      <!-- 흐릿한 메뉴들 -->
      <g opacity="0.3">
        <rect x="20" y="106" width="380" height="56" rx="8" fill="#F5F5F5" />
        <rect x="20" y="172" width="380" height="56" rx="8" fill="#F5F5F5" />
        <rect x="20" y="238" width="380" height="56" rx="8" fill="#F5F5F5" />
        <rect x="20" y="304" width="380" height="56" rx="8" fill="#F5F5F5" />
        <rect x="20" y="370" width="380" height="56" rx="8" fill="#F5F5F5" />
      </g>

      <!-- 카트 바 (접힘) -->
      <g transform="translate(20 440)">
        <rect width="380" height="104" rx="16" fill="#2563EB" />

        <!-- 토글 -->
        <text x="190" y="24" text-anchor="middle" fill="#fff" font-size="10" font-weight="800" letter-spacing="2" opacity="0.85">카트 펼치기 ▼</text>

        <!-- 액션 라인 -->
        <text x="22" y="58" fill="#fff" font-size="10" font-weight="800" letter-spacing="2" opacity="0.8">카트</text>
        <text x="22" y="84" fill="#fff" font-size="18" font-weight="800">3잔 · ₩38,000</text>

        <rect x="252" y="50" width="108" height="40" rx="10" fill="#fff" />
        <text x="306" y="76" text-anchor="middle" fill="#2563EB" font-size="13" font-weight="800">주문하기</text>
      </g>
    </g>
  </g>

  <!-- 펼친 상태 -->
  <g transform="translate(660 120)">
    <text fill="#737373" font-size="11" font-weight="800" letter-spacing="2">펼친 상태</text>

    <g transform="translate(0 26)">
      <rect width="420" height="560" rx="32" fill="#fff" stroke="#262626" stroke-width="3" />
      <rect x="160" y="14" width="100" height="20" rx="10" fill="#262626" />

      <text x="210" y="80" text-anchor="middle" fill="#A3A3A3" font-size="10" font-weight="800" letter-spacing="3">MENU</text>

      <!-- 일부 메뉴 -->
      <g opacity="0.25">
        <rect x="20" y="106" width="380" height="56" rx="8" fill="#F5F5F5" />
        <rect x="20" y="172" width="380" height="56" rx="8" fill="#F5F5F5" />
      </g>

      <!-- 카트 시트 (펼침) -->
      <g transform="translate(20 244)">
        <rect width="380" height="300" rx="16" fill="#2563EB" />

        <!-- 토글 -->
        <text x="190" y="22" text-anchor="middle" fill="#fff" font-size="10" font-weight="800" letter-spacing="2" opacity="0.85">카트 접기 ▲</text>

        <!-- 흰 영역 -->
        <rect x="0" y="38" width="380" height="190" fill="#fff" />

        <!-- 카트 행 1 -->
        <g transform="translate(14 52)">
          <rect width="352" height="80" rx="8" fill="#fff" stroke="#E5E5E5" />
          <text x="14" y="22" fill="#262626" font-size="13" font-weight="800">올드 패션드</text>
          <text x="14" y="40" fill="#737373" font-size="10">₩12,000</text>
          <text x="338" y="22" text-anchor="end" fill="#262626" font-size="13" font-weight="800">₩24,000</text>

          <rect x="14" y="48" width="84" height="24" rx="6" fill="#F5F5F5" stroke="#E5E5E5" />
          <text x="28" y="65" text-anchor="middle" fill="#525252" font-size="13" font-weight="800">−</text>
          <text x="56" y="65" text-anchor="middle" fill="#262626" font-size="12" font-weight="800">2</text>
          <text x="83" y="65" text-anchor="middle" fill="#525252" font-size="13" font-weight="800">+</text>
          <text x="338" y="65" text-anchor="end" fill="#A3A3A3" font-size="10" font-weight="700">삭제</text>
        </g>

        <!-- 카트 행 2 -->
        <g transform="translate(14 142)">
          <rect width="352" height="80" rx="8" fill="#fff" stroke="#E5E5E5" />
          <text x="14" y="22" fill="#262626" font-size="13" font-weight="800">맨해튼</text>
          <text x="14" y="40" fill="#B45309" font-size="10" font-weight="700">🔁 라이 위스키</text>
          <text x="338" y="22" text-anchor="end" fill="#262626" font-size="13" font-weight="800">₩14,000</text>

          <rect x="14" y="48" width="84" height="24" rx="6" fill="#F5F5F5" stroke="#E5E5E5" />
          <text x="28" y="65" text-anchor="middle" fill="#525252" font-size="13" font-weight="800">−</text>
          <text x="56" y="65" text-anchor="middle" fill="#262626" font-size="12" font-weight="800">1</text>
          <text x="83" y="65" text-anchor="middle" fill="#525252" font-size="13" font-weight="800">+</text>
          <text x="338" y="65" text-anchor="end" fill="#A3A3A3" font-size="10" font-weight="700">삭제</text>
        </g>

        <!-- 하단 액션 -->
        <g transform="translate(0 240)">
          <text x="22" y="22" fill="#fff" font-size="10" font-weight="800" letter-spacing="2" opacity="0.8">카트</text>
          <text x="22" y="48" fill="#fff" font-size="18" font-weight="800">3잔 · ₩38,000</text>

          <rect x="252" y="14" width="108" height="40" rx="10" fill="#fff" />
          <text x="306" y="40" text-anchor="middle" fill="#2563EB" font-size="13" font-weight="800">주문하기</text>
        </g>
      </g>
    </g>
  </g>
</svg>
