    <!-- 안내문 -->
    <line x1="60" y1="580" x2="420" y2="580" stroke="#E5E5E5" />
    <text x="240" y="630" text-anchor="middle" fill="#262626" font-family="Inter, sans-serif" font-size="18" font-weight="800">메뉴를 보고 주문하려면</text>
    <text x="240" y="660" text-anchor="middle" fill="#262626" font-family="Inter, sans-serif" font-size="18" font-weight="800">카메라로 QR 코드를 스캔하세요</text>

