        <text x="22" y="158" fill="#737373" font-size="11">🥃 올드 패션드 잔  ·  🍊 오렌지 필</text>

        <g transform="translate(22 174)">
          <rect width="456" height="48" rx="6" fill="#FAFAF9" />
          <text x="14" y="20" fill="#525252" font-size="11">진</text>
          <text x="442" y="20" text-anchor="end" fill="#A3A3A3" font-size="11">30ml</text>
          <text x="14" y="38" fill="#525252" font-size="11">캄파리</text>
          <text x="442" y="38" text-anchor="end" fill="#A3A3A3" font-size="11">30ml</text>
        </g>
