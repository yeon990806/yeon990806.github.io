            <rect width="56" height="22" rx="11" fill="#DBEAFE" />
            <text x="28" y="15" text-anchor="middle" fill="#1D4ED8" font-size="10" font-weight="800">셰이크</text>
          </g>
          <g transform="translate(150 0)">
            <rect width="68" height="22" rx="11" fill="#FEF3C7" />
            <text x="34" y="15" text-anchor="middle" fill="#B45309" font-size="10" font-weight="800">ABV 18%</text>
          </g>
        </g>

        <text x="22" y="158" fill="#737373" font-size="11">🍸 마티니  ·  ☕ 커피 빈 3알</text>

        <g transform="translate(22 174)">
          <rect width="456" height="48" rx="6" fill="#FAFAF9" />
          <text x="14" y="20" fill="#525252" font-size="11">보드카</text>
          <text x="442" y="20" text-anchor="end" fill="#A3A3A3" font-size="11">50ml</text>
          <text x="14" y="38" fill="#525252" font-size="11">에스프레소</text>
          <text x="442" y="38" text-anchor="end" fill="#A3A3A3" font-size="11">30ml</text>
        </g>
      </g>
    </g>
