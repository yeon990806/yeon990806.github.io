<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="Inter, system-ui, sans-serif">
  <rect width="1200" height="820" fill="#E5E7EB" fill-opacity="0.6" />

  <!-- 모달 -->
  <g transform="translate(60 60)">
    <rect width="1080" height="700" rx="20" fill="#fff" />

    <!-- 헤더 -->
    <g>
      <text x="32" y="44" fill="#262626" font-size="22" font-weight="800">칵테일 카탈로그</text>
      <text x="32" y="68" fill="#737373" font-size="13">원하는 칵테일을 골라 내 레시피로 가져와요. 재료는 내 재고와 자동으로 매칭돼요.</text>
      <line x1="0" y1="92" x2="1080" y2="92" stroke="#E5E5E5" />
    </g>

    <!-- 필터 + 검색 -->
    <g transform="translate(32 110)">
      <g>
        <rect width="92" height="32" rx="8" fill="#2563EB" />
        <text x="46" y="21" text-anchor="middle" fill="#fff" font-size="11" font-weight="800">전체 143</text>
      </g>
      <g transform="translate(104 0)">
        <rect width="92" height="32" rx="8" fill="#F5F5F5" />
        <text x="46" y="21" text-anchor="middle" fill="#737373" font-size="11" font-weight="700">클래식 55</text>
      </g>
      <g transform="translate(208 0)">
        <rect width="120" height="32" rx="8" fill="#F5F5F5" />
        <text x="60" y="21" text-anchor="middle" fill="#737373" font-size="11" font-weight="700">컨템포러리 43</text>
      </g>
      <g transform="translate(340 0)">
        <rect width="92" height="32" rx="8" fill="#F5F5F5" />
        <text x="46" y="21" text-anchor="middle" fill="#737373" font-size="11" font-weight="700">뉴에라 45</text>
      </g>
      <g transform="translate(444 0)">
        <rect width="572" height="32" rx="8" fill="#fff" stroke="#D4D4D4" />
        <text x="16" y="21" fill="#A3A3A3" font-size="11">이름·재료 검색</text>
      </g>
    </g>

    <!-- 카드 그리드 — 2 columns, gap 16 -->
    <g transform="translate(32 162)">
      <!-- 카드 1: 올드 패션드 -->
      <g>
        <rect width="500" height="240" rx="14" fill="#fff" stroke="#E5E5E5" />
        <g transform="translate(22 28)">
