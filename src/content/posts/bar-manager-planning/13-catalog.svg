          <text y="22" fill="#A3A3A3" font-size="11" font-weight="600">Espresso Martini</text>
        </g>
        <text x="22" y="92" fill="#737373" font-size="12">보드카·커피 리큐어·에스프레소의 어른 디저트.</text>

        <g transform="translate(22 110)">
          <rect width="78" height="22" rx="11" fill="#F5F5F5" />
          <text x="39" y="15" text-anchor="middle" fill="#525252" font-size="10" font-weight="800">IBA 뉴에라</text>
