          <g transform="translate(142 0)">
            <rect width="68" height="22" rx="11" fill="#FEF3C7" />
            <text x="34" y="15" text-anchor="middle" fill="#B45309" font-size="10" font-weight="800">ABV 30%</text>
          </g>
        </g>

        <text x="22" y="158" fill="#737373" font-size="11">🍸 쿠페  ·  🍒 체리</text>

        <g transform="translate(22 174)">
          <rect width="456" height="48" rx="6" fill="#FAFAF9" />
          <text x="14" y="20" fill="#525252" font-size="11">라이 위스키</text>
          <text x="442" y="20" text-anchor="end" fill="#A3A3A3" font-size="11">50ml</text>
          <text x="14" y="38" fill="#525252" font-size="11">스위트 베르무트</text>
          <text x="442" y="38" text-anchor="end" fill="#A3A3A3" font-size="11">20ml</text>
        </g>
      </g>

      <!-- 카드 3: 네그로니 -->
      <g transform="translate(0 256)">
        <rect width="500" height="240" rx="14" fill="#fff" stroke="#E5E5E5" />
        <g transform="translate(22 28)">
          <text fill="#262626" font-size="18" font-weight="800">네그로니</text>
          <text y="22" fill="#A3A3A3" font-size="11" font-weight="600">Negroni</text>
        </g>
        <text x="22" y="92" fill="#737373" font-size="12">진·캄파리·스위트 베르무트 1:1:1의 쌉쌀한 정통.</text>

        <g transform="translate(22 110)">
          <rect width="78" height="22" rx="11" fill="#F5F5F5" />
          <text x="39" y="15" text-anchor="middle" fill="#525252" font-size="10" font-weight="800">IBA 클래식</text>
          <g transform="translate(86 0)">
            <rect width="48" height="22" rx="11" fill="#DBEAFE" />
            <text x="24" y="15" text-anchor="middle" fill="#1D4ED8" font-size="10" font-weight="800">스터</text>
          </g>
          <g transform="translate(142 0)">
            <rect width="68" height="22" rx="11" fill="#FEF3C7" />
            <text x="34" y="15" text-anchor="middle" fill="#B45309" font-size="10" font-weight="800">ABV 24%</text>
          </g>
