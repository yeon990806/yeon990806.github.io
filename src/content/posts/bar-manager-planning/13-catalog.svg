          <rect width="456" height="48" rx="6" fill="#FAFAF9" />
          <text x="14" y="20" fill="#525252" font-size="11">버번 위스키</text>
          <text x="442" y="20" text-anchor="end" fill="#A3A3A3" font-size="11">60ml</text>
          <text x="14" y="38" fill="#525252" font-size="11">앙고스투라 비터스</text>
          <text x="442" y="38" text-anchor="end" fill="#A3A3A3" font-size="11">2dash</text>
        </g>
      </g>

      <!-- 카드 2: 맨해튼 -->
      <g transform="translate(516 0)">
        <rect width="500" height="240" rx="14" fill="#fff" stroke="#E5E5E5" />
        <g transform="translate(22 28)">
          <text fill="#262626" font-size="18" font-weight="800">맨해튼</text>
          <text y="22" fill="#A3A3A3" font-size="11" font-weight="600">Manhattan</text>
        </g>
        <text x="22" y="92" fill="#737373" font-size="12">라이 위스키와 스위트 베르무트의 고전적인 균형.</text>

        <g transform="translate(22 110)">
          <rect width="78" height="22" rx="11" fill="#F5F5F5" />
          <text x="39" y="15" text-anchor="middle" fill="#525252" font-size="10" font-weight="800">IBA 클래식</text>
          <g transform="translate(86 0)">
            <rect width="48" height="22" rx="11" fill="#DBEAFE" />
            <text x="24" y="15" text-anchor="middle" fill="#1D4ED8" font-size="10" font-weight="800">스터</text>
