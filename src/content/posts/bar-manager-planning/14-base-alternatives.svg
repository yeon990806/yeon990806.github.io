<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="Inter, system-ui, sans-serif">
  <rect width="1200" height="720" fill="#FAFAF9" />

  <!-- 제목 -->
  <text x="600" y="50" text-anchor="middle" fill="#262626" font-size="20" font-weight="800">레시피 폼 — 기주 옵션 편집</text>

  <!-- 재료 카드 -->
  <g transform="translate(120 100)">
    <rect width="960" height="540" rx="14" fill="#fff" stroke="#FCD34D" stroke-width="2" />

    <!-- 상단 행 — 기주로 토글된 재료 -->
    <g transform="translate(24 24)">
      <text fill="#262626" font-size="14" font-weight="800">고든스 진</text>
      <g transform="translate(98 -10)">
        <rect width="36" height="18" rx="9" fill="#FEF3C7" />
        <text x="18" y="13" text-anchor="middle" fill="#B45309" font-size="10" font-weight="800">기주</text>
      </g>
      <text y="32" fill="#737373" font-size="12">진 · 재고 700ml</text>

      <!-- 기주 토글 (활성) -->
      <g transform="translate(500 -10)">
        <rect width="96" height="44" rx="8" fill="#FEF3C7" stroke="#FCD34D" stroke-width="2" />
        <text x="48" y="28" text-anchor="middle" fill="#B45309" font-size="12" font-weight="800">🔁 기주</text>
      </g>

      <!-- 수량 -->
      <g transform="translate(612 -10)">
        <rect width="140" height="44" rx="8" fill="#fff" stroke="#D4D4D4" />
        <text x="16" y="28" fill="#525252" font-size="16" font-weight="800">−</text>
        <text x="70" y="29" text-anchor="middle" fill="#262626" font-size="14" font-weight="800">45 ml</text>
        <text x="124" y="28" text-anchor="middle" fill="#525252" font-size="16" font-weight="800">+</text>
      </g>

      <!-- 제거 -->
      <g transform="translate(768 -10)">
        <rect width="44" height="44" rx="8" fill="#fff" stroke="#E5E5E5" />
        <text x="22" y="30" text-anchor="middle" fill="#A3A3A3" font-size="18">×</text>
      </g>
    </g>

    <!-- 구분선 -->
    <line x1="24" y1="96" x2="936" y2="96" stroke="#FCD34D" stroke-opacity="0.4" />

    <!-- 펼침 영역 -->
    <g transform="translate(24 116)">
      <text fill="#B45309" font-size="11" font-weight="800" letter-spacing="2">대체 기주 옵션  ·  같은 진 만 선택 가능</text>

      <!-- 옵션 1: 비피터 -->
      <g transform="translate(0 28)">
        <rect width="912" height="52" rx="10" fill="#fff" stroke="#FCD34D" />
        <text x="20" y="32" fill="#262626" font-size="14" font-weight="800">비피터 런던 드라이</text>
        <!-- 가격 input -->
        <g transform="translate(720 12)">
          <rect width="110" height="28" rx="6" fill="#fff" stroke="#D4D4D4" />
          <text x="14" y="20" fill="#A3A3A3" font-size="12" font-weight="700">+</text>
          <text x="55" y="20" text-anchor="middle" fill="#262626" font-size="13" font-weight="800">1,000</text>
          <text x="98" y="20" text-anchor="end" fill="#737373" font-size="11" font-weight="700">원</text>
        </g>
        <!-- 제거 -->
        <g transform="translate(852 12)">
          <rect width="40" height="28" rx="6" fill="none" />
          <text x="20" y="20" text-anchor="middle" fill="#A3A3A3" font-size="16">×</text>
        </g>
      </g>

      <!-- 옵션 2: 봄베이 사파이어 -->
      <g transform="translate(0 92)">
        <rect width="912" height="52" rx="10" fill="#fff" stroke="#FCD34D" />
        <text x="20" y="32" fill="#262626" font-size="14" font-weight="800">봄베이 사파이어</text>
        <g transform="translate(720 12)">
          <rect width="110" height="28" rx="6" fill="#fff" stroke="#D4D4D4" />
          <text x="14" y="20" fill="#A3A3A3" font-size="12" font-weight="700">+</text>
          <text x="55" y="20" text-anchor="middle" fill="#262626" font-size="13" font-weight="800">2,000</text>
          <text x="98" y="20" text-anchor="end" fill="#737373" font-size="11" font-weight="700">원</text>
        </g>
        <g transform="translate(852 12)">
          <rect width="40" height="28" rx="6" fill="none" />
          <text x="20" y="20" text-anchor="middle" fill="#A3A3A3" font-size="16">×</text>
        </g>
      </g>

      <!-- 옵션 3: 헨드릭스 -->
      <g transform="translate(0 156)">
        <rect width="912" height="52" rx="10" fill="#fff" stroke="#FCD34D" />
        <text x="20" y="32" fill="#262626" font-size="14" font-weight="800">헨드릭스</text>
        <g transform="translate(720 12)">
          <rect width="110" height="28" rx="6" fill="#fff" stroke="#D4D4D4" />
          <text x="14" y="20" fill="#A3A3A3" font-size="12" font-weight="700">+</text>
          <text x="55" y="20" text-anchor="middle" fill="#262626" font-size="13" font-weight="800">3,000</text>
          <text x="98" y="20" text-anchor="end" fill="#737373" font-size="11" font-weight="700">원</text>
        </g>
        <g transform="translate(852 12)">
          <rect width="40" height="28" rx="6" fill="none" />
          <text x="20" y="20" text-anchor="middle" fill="#A3A3A3" font-size="16">×</text>
        </g>
      </g>

      <!-- 검색 input -->
      <g transform="translate(0 224)">
        <rect width="912" height="42" rx="8" fill="#fff" stroke="#D4D4D4" />
        <text x="16" y="27" fill="#A3A3A3" font-size="12">대체할 기주 검색</text>
      </g>

      <!-- 검색 결과 드롭다운 -->
      <g transform="translate(0 276)">
        <rect width="912" height="124" rx="8" fill="#fff" stroke="#E5E5E5" />
        <g>
          <text x="16" y="26" fill="#262626" font-size="13" font-weight="800">탱커레이 10</text>
          <text x="16" y="44" fill="#A3A3A3" font-size="11">진 · 재고 0ml</text>
          <line x1="0" y1="62" x2="912" y2="62" stroke="#F5F5F5" />
        </g>
        <g transform="translate(0 62)">
          <text x="16" y="26" fill="#262626" font-size="13" font-weight="800">올드 톰 진</text>
          <text x="16" y="44" fill="#A3A3A3" font-size="11">진 · 재고 350ml</text>
        </g>
      </g>
    </g>
  </g>
</svg>
