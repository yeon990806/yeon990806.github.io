<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Inter, system-ui, sans-serif">
  <rect width="900" height="620" fill="#FAFAF9" />

  <text x="450" y="42" text-anchor="middle" fill="#262626" font-size="20" font-weight="800">첫 통합 — 끝에서 끝까지 한 번 돌려보기</text>
  <text x="450" y="66" text-anchor="middle" fill="#737373" font-size="13">DB 컨테이너부터 「한 잔 만들기」 클릭 한 번까지 7단계</text>

  <!-- Step 1: db up -->
  <g transform="translate(60 100)">
    <circle cx="20" cy="20" r="14" fill="#2563EB" />
    <text x="20" y="25" text-anchor="middle" fill="#fff" font-size="12" font-weight="800">1</text>
    <rect x="60" y="4" width="770" height="32" rx="8" fill="#fff" stroke="#D4D4D4" stroke-width="1.5" />
    <text x="76" y="24" fill="#404040" font-size="13" font-weight="700">pnpm db:up</text>
    <text x="200" y="24" fill="#737373" font-size="12">PostgreSQL 컨테이너를 띄운다</text>
  </g>

  <!-- Step 2: pnpm dev -->
  <g transform="translate(60 160)">
    <circle cx="20" cy="20" r="14" fill="#2563EB" />
    <text x="20" y="25" text-anchor="middle" fill="#fff" font-size="12" font-weight="800">2</text>
    <rect x="60" y="4" width="770" height="32" rx="8" fill="#fff" stroke="#D4D4D4" stroke-width="1.5" />
    <text x="76" y="24" fill="#404040" font-size="13" font-weight="700">pnpm dev</text>
    <text x="200" y="24" fill="#737373" font-size="12">API(3001) + Web(5173) 동시 실행</text>
  </g>

  <!-- Step 3: 회원가입/로그인 -->
  <g transform="translate(60 220)">
    <circle cx="20" cy="20" r="14" fill="#2563EB" />
    <text x="20" y="25" text-anchor="middle" fill="#fff" font-size="12" font-weight="800">3</text>
    <rect x="60" y="4" width="770" height="32" rx="8" fill="#fff" stroke="#D4D4D4" stroke-width="1.5" />
    <text x="76" y="24" fill="#404040" font-size="13" font-weight="700">브라우저 → 회원가입 → 로그인</text>
    <text x="380" y="24" fill="#737373" font-size="12">JWT 토큰이 localStorage에 저장된다</text>
  </g>

  <!-- Step 4: 재고 추가 -->
  <g transform="translate(60 280)">
    <circle cx="20" cy="20" r="14" fill="#2563EB" />
    <text x="20" y="25" text-anchor="middle" fill="#fff" font-size="12" font-weight="800">4</text>
    <rect x="60" y="4" width="770" height="46" rx="8" fill="#fff" stroke="#D4D4D4" stroke-width="1.5" />
    <text x="76" y="24" fill="#404040" font-size="13" font-weight="700">재고 추가</text>
    <text x="76" y="42" fill="#737373" font-size="12">탱커레이 진 700 ml · 토닉워터 1500 ml · 라임 8개</text>
  </g>

  <!-- Step 5: 레시피 추가 -->
  <g transform="translate(60 354)">
    <circle cx="20" cy="20" r="14" fill="#2563EB" />
    <text x="20" y="25" text-anchor="middle" fill="#fff" font-size="12" font-weight="800">5</text>
    <rect x="60" y="4" width="770" height="46" rx="8" fill="#fff" stroke="#D4D4D4" stroke-width="1.5" />
    <text x="76" y="24" fill="#404040" font-size="13" font-weight="700">레시피 추가 — 진토닉</text>
    <text x="76" y="42" fill="#737373" font-size="12">진 45 ml + 토닉 120 ml + 라임 1개</text>
  </g>

  <!-- Step 6: 「한 잔 만들기」 클릭 (강조) -->
  <g transform="translate(60 428)">
    <circle cx="20" cy="20" r="14" fill="#F59E0B" />
    <text x="20" y="25" text-anchor="middle" fill="#fff" font-size="12" font-weight="800">6</text>
    <rect x="60" y="0" width="770" height="72" rx="10" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2" />
    <text x="76" y="22" fill="#B45309" font-size="11" font-weight="800" letter-spacing="1">차감 엔진 실행</text>
    <text x="76" y="44" fill="#262626" font-size="14" font-weight="700">「한 잔 만들기」 클릭</text>
    <!-- 결과 표시 -->
    <g transform="translate(76 52)">
      <rect x="0" y="0" width="90" height="18" rx="4" fill="#FEF3C7" />
      <text x="45" y="13" text-anchor="middle" fill="#92400E" font-size="10" font-weight="700">진 700 → 655 ml</text>
    </g>
    <g transform="translate(176 52)">
      <rect x="0" y="0" width="120" height="18" rx="4" fill="#FEF3C7" />
      <text x="60" y="13" text-anchor="middle" fill="#92400E" font-size="10" font-weight="700">토닉 1500 → 1380 ml</text>
    </g>
    <g transform="translate(306 52)">
      <rect x="0" y="0" width="90" height="18" rx="4" fill="#FEF3C7" />
      <text x="45" y="13" text-anchor="middle" fill="#92400E" font-size="10" font-weight="700">라임 8 → 7개</text>
    </g>
  </g>

  <!-- Step 7: 로그 확인 -->
  <g transform="translate(60 520)">
    <circle cx="20" cy="20" r="14" fill="#2563EB" />
    <text x="20" y="25" text-anchor="middle" fill="#fff" font-size="12" font-weight="800">7</text>
    <rect x="60" y="4" width="770" height="32" rx="8" fill="#fff" stroke="#D4D4D4" stroke-width="1.5" />
    <text x="76" y="24" fill="#404040" font-size="13" font-weight="700">StockLog 페이지에서 방금 찍힌 차감 로그 확인</text>
  </g>

  <!-- 하단 결론 배너 -->
  <g transform="translate(60 570)">
    <rect x="0" y="0" width="780" height="36" rx="10" fill="#DBEAFE" />
    <text x="16" y="23" fill="#1D4ED8" font-size="12" font-weight="800">✓ 이 흐름이 돌면, 그 뒤 모든 기능은 이 위의 변주가 된다.</text>
  </g>
</svg>
