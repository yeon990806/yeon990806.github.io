<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" font-family="Inter, system-ui, sans-serif">
  <rect width="1200" height="380" fill="#FAFAF9" />

  <!-- 제목 -->
  <text x="600" y="42" text-anchor="middle" fill="#262626" font-size="20" font-weight="800">업장 운영 흐름 — 한 visit의 라이프사이클</text>
  <text x="600" y="66" text-anchor="middle" fill="#737373" font-size="13">가운데 차감 엔진만 색이 다릅니다. 저게 홈바랑 공유하는 코어</text>

  <!-- 스텝 5개 -->
  <!-- Step 1: 빈 좌석 -->
  <g transform="translate(40 130)">
    <rect width="180" height="80" rx="14" fill="#fff" stroke="#E5E5E5" stroke-width="2" stroke-dasharray="6 4" />
    <text x="90" y="34" text-anchor="middle" fill="#525252" font-size="11" font-weight="800" letter-spacing="1">1</text>
    <text x="90" y="56" text-anchor="middle" fill="#262626" font-size="15" font-weight="700">빈 좌석</text>
  </g>

  <!-- 화살표 -->
  <g transform="translate(220 165)">
    <line x1="0" y1="5" x2="24" y2="5" stroke="#9CA3AF" stroke-width="2" />
    <polygon points="24,0 30,5 24,10" fill="#9CA3AF" />
  </g>

  <!-- Step 2: visit 생성 -->
  <g transform="translate(258 130)">
    <rect width="180" height="80" rx="14" fill="#fff" stroke="#D4D4D4" stroke-width="2" />
    <text x="90" y="34" text-anchor="middle" fill="#525252" font-size="11" font-weight="800" letter-spacing="1">2</text>
    <text x="90" y="56" text-anchor="middle" fill="#262626" font-size="15" font-weight="700">새 주문 시작</text>
    <text x="90" y="72" text-anchor="middle" fill="#737373" font-size="11">visit 생성</text>
  </g>

  <!-- 화살표 -->
  <g transform="translate(438 165)">
    <line x1="0" y1="5" x2="24" y2="5" stroke="#9CA3AF" stroke-width="2" />
    <polygon points="24,0 30,5 24,10" fill="#9CA3AF" />
  </g>

  <!-- Step 3: 주문 N회 (반복 표시) -->
  <g transform="translate(476 130)">
    <rect width="180" height="80" rx="14" fill="#fff" stroke="#D4D4D4" stroke-width="2" />
    <text x="90" y="34" text-anchor="middle" fill="#525252" font-size="11" font-weight="800" letter-spacing="1">3</text>
    <text x="90" y="56" text-anchor="middle" fill="#262626" font-size="15" font-weight="700">주문 (N회)</text>
    <text x="90" y="72" text-anchor="middle" fill="#737373" font-size="11">메뉴 추가 · 취소</text>
    <!-- 반복 화살표 -->
    <path d="M 140 20 Q 170 -10 155 -8" stroke="#F59E0B" stroke-width="2" fill="none" />
    <polygon points="152,-6 158,-14 162,-4" fill="#F59E0B" />
    <text x="185" y="-2" fill="#B45309" font-size="10" font-weight="700">반복</text>
  </g>

  <!-- 화살표 -->
  <g transform="translate(656 165)">
    <line x1="0" y1="5" x2="24" y2="5" stroke="#9CA3AF" stroke-width="2" />
    <polygon points="24,0 30,5 24,10" fill="#9CA3AF" />
  </g>

  <!-- Step 4: 재고 차감 (강조 - 공통 코어) -->
  <g transform="translate(694 120)">
    <rect width="200" height="100" rx="14" fill="#2563EB" />
    <text x="100" y="30" text-anchor="middle" fill="#BFDBFE" font-size="11" font-weight="800" letter-spacing="1">4 · 공통 코어</text>
    <text x="100" y="56" text-anchor="middle" fill="#fff" font-size="16" font-weight="800">재고 자동 차감</text>
    <text x="100" y="80" text-anchor="middle" fill="#BFDBFE" font-size="12">차감 엔진 재사용</text>
  </g>

  <!-- 화살표 -->
  <g transform="translate(894 165)">
    <line x1="0" y1="5" x2="24" y2="5" stroke="#9CA3AF" stroke-width="2" />
    <polygon points="24,0 30,5 24,10" fill="#9CA3AF" />
  </g>

  <!-- Step 5: 결제 -->
  <g transform="translate(932 130)">
    <rect width="180" height="80" rx="14" fill="#fff" stroke="#D4D4D4" stroke-width="2" />
    <text x="90" y="34" text-anchor="middle" fill="#525252" font-size="11" font-weight="800" letter-spacing="1">5</text>
    <text x="90" y="56" text-anchor="middle" fill="#262626" font-size="15" font-weight="700">결제 · 종료</text>
    <text x="90" y="72" text-anchor="middle" fill="#737373" font-size="11">visit close</text>
  </g>

  <!-- 좌석 비움으로 순환 화살표 -->
  <path d="M 1022 210 Q 1110 320 130 320 Q 60 320 60 220" stroke="#9CA3AF" stroke-width="2" fill="none" stroke-dasharray="4 4" />
  <polygon points="55,225 60,215 65,225" fill="#9CA3AF" />
  <text x="580" y="345" text-anchor="middle" fill="#737373" font-size="12">좌석 비움 → 다음 손님</text>

  <!-- 홈바와 공유 표시 (하단) -->
  <g transform="translate(694 240)">
    <line x1="100" y1="0" x2="100" y2="20" stroke="#2563EB" stroke-width="2" stroke-dasharray="3 3" />
    <rect x="0" y="18" width="200" height="24" rx="6" fill="#DBEAFE" />
    <text x="100" y="34" text-anchor="middle" fill="#1D4ED8" font-size="11" font-weight="800">홈바에서도 같은 엔진 호출</text>
  </g>
</svg>
