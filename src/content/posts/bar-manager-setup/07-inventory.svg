      <g transform="translate(0 336)">
        <text x="22" y="34" fill="#262626" font-size="13" font-weight="800">심플 시럽</text>
        <text x="250" y="34" fill="#737373" font-size="12">시럽 · 자가제조</text>
        <text x="560" y="34" text-anchor="end" fill="#262626" font-size="12" font-weight="800">250 ml</text>
        <text x="690" y="34" text-anchor="end" fill="#737373" font-size="12">200 ml</text>
        <text x="838" y="34" text-anchor="end" fill="#262626" font-size="12" font-weight="700">₩3,000</text>
        <text x="864" y="34" fill="#737373" font-size="12">D-30</text>
        <g transform="translate(984 18)">
          <rect width="74" height="20" rx="6" fill="#F0FDF4" />
          <text x="37" y="14" text-anchor="middle" fill="#16A34A" font-size="10" font-weight="800">정상</text>
