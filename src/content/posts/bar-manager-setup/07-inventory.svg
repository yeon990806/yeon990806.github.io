    <!-- 하단: 인라인 편집 힌트 + 페이지 -->
    <g transform="translate(0 436)">
      <line x1="0" y1="0" x2="1080" y2="0" stroke="#E5E5E5" />
      <text x="22" y="30" fill="#737373" font-size="11" font-weight="700">최소재고·원가는 셀에서 바로 수정 · 42개 재료</text>
      <text x="1058" y="30" text-anchor="end" fill="#A3A3A3" font-size="11">1 / 3 페이지</text>
    </g>
