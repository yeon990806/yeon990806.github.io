        <text x="250" y="34" fill="#737373" font-size="12">믹서 · 토닉워터</text>
        <text x="560" y="34" text-anchor="end" fill="#262626" font-size="12" font-weight="800">1,200 ml</text>
        <text x="690" y="34" text-anchor="end" fill="#737373" font-size="12">500 ml</text>
        <text x="838" y="34" text-anchor="end" fill="#262626" font-size="12" font-weight="700">₩1,200</text>
        <text x="864" y="34" fill="#737373" font-size="12">D-90</text>
