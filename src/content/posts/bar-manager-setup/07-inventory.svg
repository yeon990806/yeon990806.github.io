      <g transform="translate(0 168)">
        <text x="22" y="34" fill="#262626" font-size="13" font-weight="800">드라이 베르무트</text>
        <text x="250" y="34" fill="#737373" font-size="12">베르무트</text>
        <text x="560" y="34" text-anchor="end" fill="#DC2626" font-size="12" font-weight="800">60 ml</text>
        <text x="690" y="34" text-anchor="end" fill="#737373" font-size="12">100 ml</text>
        <text x="838" y="34" text-anchor="end" fill="#262626" font-size="12" font-weight="700">₩18,000</text>
        <text x="864" y="34" fill="#DC2626" font-size="12" font-weight="700">D-5</text>
        <g transform="translate(972 18)">
          <rect width="86" height="20" rx="6" fill="#FEF3C7" />
          <text x="43" y="14" text-anchor="middle" fill="#B45309" font-size="10" font-weight="800">소진 임박</text>
        </g>
        <line x1="0" y1="56" x2="1080" y2="56" stroke="#F5F5F5" />
      </g>
      <!-- Row 5 — 소진 임박 -->
      <g transform="translate(0 224)">
        <text x="22" y="34" fill="#262626" font-size="13" font-weight="800">라임</text>
        <text x="250" y="34" fill="#737373" font-size="12">과일 · 라임</text>
        <text x="560" y="34" text-anchor="end" fill="#DC2626" font-size="12" font-weight="800">3 개</text>
        <text x="690" y="34" text-anchor="end" fill="#737373" font-size="12">6 개</text>
        <text x="838" y="34" text-anchor="end" fill="#262626" font-size="12" font-weight="700">₩800</text>
        <text x="864" y="34" fill="#DC2626" font-size="12" font-weight="700">D-2</text>
        <g transform="translate(972 18)">
          <rect width="86" height="20" rx="6" fill="#FEF3C7" />
          <text x="43" y="14" text-anchor="middle" fill="#B45309" font-size="10" font-weight="800">소진 임박</text>
