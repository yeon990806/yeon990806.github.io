<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 740" font-family="Inter, system-ui, sans-serif">
  <rect width="1200" height="740" fill="#FAFAF9" />

  <!-- 헤더 -->
  <g transform="translate(60 50)">
    <text fill="#262626" font-size="24" font-weight="800">재고</text>
    <text y="28" fill="#737373" font-size="13">재료를 등록하고 입고·폐기·개봉을 기록해요. 현재고·최소재고·원가를 한 곳에서.</text>
  </g>

  <!-- 필터 + 검색 + 입고 -->
  <g transform="translate(60 130)">
    <g>
      <rect width="84" height="36" rx="8" fill="#2563EB" />
      <text x="42" y="24" text-anchor="middle" fill="#fff" font-size="12" font-weight="800">전체 42</text>
    </g>
    <g transform="translate(96 0)">
      <rect width="118" height="36" rx="8" fill="#FEF3C7" />
      <text x="59" y="24" text-anchor="middle" fill="#B45309" font-size="12" font-weight="800">소진 임박 3</text>
    </g>
    <g transform="translate(226 0)">
      <rect width="638" height="36" rx="8" fill="#fff" stroke="#D4D4D4" />
      <text x="16" y="24" fill="#A3A3A3" font-size="12">재료·카테고리 검색</text>
    </g>
    <g transform="translate(876 0)">
      <rect width="88" height="36" rx="8" fill="#fff" stroke="#D4D4D4" />
      <text x="44" y="24" text-anchor="middle" fill="#525252" font-size="12" font-weight="700">▦ 컬럼</text>
    </g>
    <g transform="translate(976 0)">
      <rect width="104" height="36" rx="8" fill="#2563EB" />
      <text x="52" y="24" text-anchor="middle" fill="#fff" font-size="12" font-weight="800">+ 입고</text>
    </g>
  </g>

  <!-- 테이블 -->
  <g transform="translate(60 200)">
    <rect width="1080" height="484" rx="14" fill="#fff" stroke="#E5E5E5" />

    <!-- 헤더 행 -->
    <rect width="1080" height="44" rx="14" fill="#FAFAF9" />
    <line x1="0" y1="44" x2="1080" y2="44" stroke="#E5E5E5" />
    <g fill="#737373" font-size="10" font-weight="800" letter-spacing="1">
      <text x="22" y="28">재료</text>
      <text x="250" y="28">카테고리</text>
      <text x="560" y="28" text-anchor="end">현재고</text>
      <text x="690" y="28" text-anchor="end">최소재고</text>
      <text x="838" y="28" text-anchor="end">원가</text>
      <text x="864" y="28">만료</text>
      <text x="1058" y="28" text-anchor="end">상태</text>
    </g>

    <!-- 행들 (각 56 높이) -->
    <g transform="translate(0 44)">
      <!-- Row 1 — 정상 -->
      <g>
        <text x="22" y="34" fill="#262626" font-size="13" font-weight="800">탱커레이 진</text>
        <text x="250" y="34" fill="#737373" font-size="12">진 · 런던 드라이</text>
        <text x="560" y="34" text-anchor="end" fill="#262626" font-size="12" font-weight="800">520 ml</text>
        <text x="690" y="34" text-anchor="end" fill="#737373" font-size="12">200 ml</text>
        <text x="838" y="34" text-anchor="end" fill="#262626" font-size="12" font-weight="700">₩45,000</text>
        <text x="864" y="34" fill="#737373" font-size="12">D-180</text>
        <g transform="translate(984 18)">
          <rect width="74" height="20" rx="6" fill="#F0FDF4" />
          <text x="37" y="14" text-anchor="middle" fill="#16A34A" font-size="10" font-weight="800">정상</text>
        </g>
        <line x1="0" y1="56" x2="1080" y2="56" stroke="#F5F5F5" />
      </g>
      <!-- Row 2 — 소진 임박 -->
      <g transform="translate(0 56)">
        <text x="22" y="34" fill="#262626" font-size="13" font-weight="800">버번 위스키</text>
        <text x="250" y="34" fill="#737373" font-size="12">위스키 · 버번</text>
        <text x="560" y="34" text-anchor="end" fill="#DC2626" font-size="12" font-weight="800">90 ml</text>
        <text x="690" y="34" text-anchor="end" fill="#737373" font-size="12">150 ml</text>
        <text x="838" y="34" text-anchor="end" fill="#262626" font-size="12" font-weight="700">₩38,000</text>
        <text x="864" y="34" fill="#A3A3A3" font-size="12">—</text>
        <g transform="translate(972 18)">
          <rect width="86" height="20" rx="6" fill="#FEF3C7" />
          <text x="43" y="14" text-anchor="middle" fill="#B45309" font-size="10" font-weight="800">소진 임박</text>
        </g>
        <line x1="0" y1="56" x2="1080" y2="56" stroke="#F5F5F5" />
      </g>
      <!-- Row 3 — 정상 -->
      <g transform="translate(0 112)">
        <text x="22" y="34" fill="#262626" font-size="13" font-weight="800">앙고스투라 비터스</text>
        <text x="250" y="34" fill="#737373" font-size="12">비터 · 앵고스튜라</text>
        <text x="560" y="34" text-anchor="end" fill="#262626" font-size="12" font-weight="800">140 ml</text>
        <text x="690" y="34" text-anchor="end" fill="#737373" font-size="12">30 ml</text>
        <text x="838" y="34" text-anchor="end" fill="#262626" font-size="12" font-weight="700">₩22,000</text>
        <text x="864" y="34" fill="#737373" font-size="12">D-540</text>
        <g transform="translate(984 18)">
          <rect width="74" height="20" rx="6" fill="#F0FDF4" />
          <text x="37" y="14" text-anchor="middle" fill="#16A34A" font-size="10" font-weight="800">정상</text>
        </g>
        <line x1="0" y1="56" x2="1080" y2="56" stroke="#F5F5F5" />
      </g>
